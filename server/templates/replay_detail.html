<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match Replay — Bot Royale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #1e1e35;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --text-primary: #eaeaea;
            --text-secondary: #8888a0;
            --border: #2a2a40;
            --red-color: #ff4757;
            --blue-color: #3498db;
            --empty-color: #2a2a40;
            --success: #00c853;
            --error: #ff5252;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 30% 30%, rgba(233, 69, 96, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(15, 52, 96, 0.1) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .nav-brand {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--text-primary); }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-bottom: 1.5rem;
            transition: opacity 0.2s;
        }

        .back-link:hover { opacity: 0.7; }

        .match-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .match-header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .match-header .team-red { color: var(--red-color); }
        .match-header .team-blue { color: var(--blue-color); }
        .match-header .vs { color: var(--text-secondary); margin: 0 0.5rem; }

        .result-badge {
            display: inline-block;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        .result-badge.red-win {
            background: rgba(255, 71, 87, 0.15);
            color: var(--red-color);
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .result-badge.blue-win {
            background: rgba(52, 152, 219, 0.15);
            color: var(--blue-color);
            border: 1px solid rgba(52, 152, 219, 0.3);
        }

        .result-badge.draw {
            background: rgba(136, 136, 160, 0.15);
            color: var(--text-secondary);
            border: 1px solid rgba(136, 136, 160, 0.3);
        }

        .reason-text {
            margin-top: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Board grid */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin: 1.5rem 0;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
            background: var(--border);
            padding: 3px;
            border-radius: 8px;
            width: 100%;
            max-width: 420px;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .cell.red {
            background: rgba(255, 71, 87, 0.2);
            color: var(--red-color);
            box-shadow: inset 0 0 12px rgba(255, 71, 87, 0.15);
        }

        .cell.blue {
            background: rgba(52, 152, 219, 0.2);
            color: var(--blue-color);
            box-shadow: inset 0 0 12px rgba(52, 152, 219, 0.15);
        }

        .cell.highlight {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .cell.explode {
            animation: explode 0.4s ease-out;
        }

        @keyframes explode {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }

        /* Timer display */
        .timers {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin: 1rem 0;
        }

        .timer-box {
            text-align: center;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            min-width: 140px;
        }

        .timer-box.red-timer {
            border-color: rgba(255, 71, 87, 0.3);
            background: rgba(255, 71, 87, 0.05);
        }

        .timer-box.blue-timer {
            border-color: rgba(52, 152, 219, 0.3);
            background: rgba(52, 152, 219, 0.05);
        }

        .timer-box.active-turn {
            border-width: 2px;
        }

        .timer-box.red-timer.active-turn {
            border-color: var(--red-color);
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.2);
        }

        .timer-box.blue-timer.active-turn {
            border-color: var(--blue-color);
            box-shadow: 0 0 15px rgba(52, 152, 219, 0.2);
        }

        .timer-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.3rem;
        }

        .timer-label.red { color: var(--red-color); }
        .timer-label.blue { color: var(--blue-color); }

        .timer-value {
            font-size: 1.4rem;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
        }

        .timer-value.red { color: var(--red-color); }
        .timer-value.blue { color: var(--blue-color); }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin: 1.5rem 0;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            padding: 0.6rem 1.2rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .ctrl-btn:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .ctrl-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .ctrl-btn.primary {
            background: linear-gradient(135deg, var(--accent), #c23152);
            border: none;
            color: white;
            min-width: 120px;
        }

        .ctrl-btn.primary:hover {
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .move-counter {
            font-weight: 700;
            font-size: 1.1rem;
            min-width: 120px;
            text-align: center;
        }

        .move-counter span { color: var(--accent); }

        /* Playback mode toggle */
        .playback-modes {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .mode-btn {
            padding: 0.4rem 0.8rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .mode-btn:hover { border-color: var(--accent); color: var(--accent); }

        .mode-btn.active {
            background: rgba(233, 69, 96, 0.15);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Speed control (only visible in fixed-speed mode) */
        .speed-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .speed-control input[type="range"] {
            width: 120px;
            accent-color: var(--accent);
        }

        .speed-control.hidden { display: none; }

        /* Time scale control (only visible in real-time mode) */
        .timescale-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .timescale-control.hidden { display: none; }

        .timescale-control input[type="range"] {
            width: 120px;
            accent-color: var(--accent);
        }

        /* Move time indicator */
        .move-time-indicator {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            min-height: 1.3em;
        }

        .move-time-indicator .time-val {
            color: var(--accent);
            font-weight: 700;
        }

        /* Progress bar */
        .progress-container {
            width: 100%;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 1rem 0;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #c23152);
            border-radius: 2px;
            transition: width 0.1s linear;
        }

        /* Move log */
        .move-log {
            max-height: 350px;
            overflow-y: auto;
            font-size: 0.85rem;
        }

        .move-log-entry {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid rgba(42, 42, 64, 0.3);
            align-items: center;
            cursor: pointer;
            transition: background 0.15s;
        }

        .move-log-entry:hover { background: rgba(233, 69, 96, 0.05); }

        .move-log-entry.active {
            background: rgba(233, 69, 96, 0.1);
            border-left: 3px solid var(--accent);
        }

        .move-num {
            color: var(--text-secondary);
            font-weight: 600;
            min-width: 35px;
        }

        .move-team {
            font-weight: 600;
            min-width: 80px;
        }

        .move-team.red { color: var(--red-color); }
        .move-team.blue { color: var(--blue-color); }

        .move-cell { color: var(--text-secondary); }

        .move-time {
            margin-left: auto;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-variant-numeric: tabular-nums;
        }

        .move-result {
            font-size: 0.75rem;
            padding: 0.15rem 0.4rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .move-result.ok { color: var(--text-secondary); }
        .move-result.win { color: var(--success); background: rgba(0, 200, 83, 0.1); }
        .move-result.invalid { color: var(--error); background: rgba(255, 82, 82, 0.1); }
        .move-result.timeout { color: var(--error); background: rgba(255, 82, 82, 0.1); }

        .loading-screen {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .loading-screen .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 700px) {
            .match-header h1 { font-size: 1.4rem; }
            .container { padding: 1rem; }
            .timers { gap: 1rem; }
            .timer-box { min-width: 100px; padding: 0.5rem 0.75rem; }
            .timer-value { font-size: 1.1rem; }
            .controls { gap: 0.4rem; }
            .ctrl-btn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a class="nav-brand" href="/">⚔ Bot Royale</a>
        <ul class="nav-links">
            <li><a href="/">Leaderboard</a></li>
            <li><a href="/replays">Game Replays</a></li>
            <li><a href="/bots">Bot Code</a></li>
        </ul>
    </nav>

    <div class="container">
        <a class="back-link" href="/replays">← Back to Replays</a>

        <!-- Loading state -->
        <div id="loadingScreen" class="loading-screen">
            <div class="spinner"></div>
            <div>Loading game data...</div>
        </div>

        <!-- Main content (hidden until loaded) -->
        <div id="mainContent" style="display: none;">
            <div class="match-header">
                <h1>
                    <span class="team-red" id="redName">{{ game.red_bot }}</span>
                    <span class="vs">vs</span>
                    <span class="team-blue" id="blueName">{{ game.blue_bot }}</span>
                </h1>
                <div id="resultBadge"></div>
                <div class="reason-text" id="reasonText"></div>
            </div>

            <!-- Board replay -->
            <div class="card">
                <h2 style="font-size: 1.3rem; margin-bottom: 0.5rem;">🎬 Game Replay</h2>

                <!-- Timers -->
                <div class="timers">
                    <div class="timer-box red-timer" id="redTimerBox">
                        <div class="timer-label red">🔴 {{ game.red_bot }}</div>
                        <div class="timer-value red" id="redTimer">60.000s</div>
                    </div>
                    <div class="timer-box blue-timer" id="blueTimerBox">
                        <div class="timer-label blue">🔵 {{ game.blue_bot }}</div>
                        <div class="timer-value blue" id="blueTimer">60.000s</div>
                    </div>
                </div>

                <!-- Playback mode toggle -->
                <div class="playback-modes">
                    <button class="mode-btn active" id="modeRealtime" onclick="setMode('realtime')">⏱ Real-Time</button>
                    <button class="mode-btn" id="modeFixed" onclick="setMode('fixed')">⚡ Fixed Speed</button>
                </div>

                <!-- Speed control (fixed mode) -->
                <div class="speed-control hidden" id="speedControl">
                    <span>Speed:</span>
                    <input type="range" id="speedSlider" min="1" max="20" value="5">
                    <span id="speedLabel">5×</span>
                </div>

                <!-- Time scale control (real-time mode) -->
                <div class="timescale-control" id="timescaleControl">
                    <span>Time Scale:</span>
                    <input type="range" id="timescaleSlider" min="1" max="50" value="1">
                    <span id="timescaleLabel">1× (actual speed)</span>
                </div>

                <!-- Move time indicator -->
                <div class="move-time-indicator" id="moveTimeIndicator"></div>

                <div class="board-container">
                    <div class="board-grid" id="boardGrid"></div>
                </div>

                <!-- Progress bar -->
                <div class="progress-container" id="progressContainer" onclick="seekProgress(event)">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="controls">
                    <button class="ctrl-btn" id="btnStart" onclick="goToMove(-1)">⏮</button>
                    <button class="ctrl-btn" id="btnPrev" onclick="prevMove()">◀</button>
                    <button class="ctrl-btn primary" id="btnPlay" onclick="togglePlay()">▶ Play</button>
                    <button class="ctrl-btn" id="btnNext" onclick="nextMove()">▶</button>
                    <button class="ctrl-btn" id="btnEnd" onclick="goToMove(moves.length - 1)">⏭</button>
                    <div class="move-counter">Move <span id="moveNum">0</span> / <span id="totalMoves">0</span></div>
                </div>
            </div>

            <!-- Move log -->
            <div class="card">
                <h2 style="font-size: 1.3rem; margin-bottom: 1rem;">📜 Move Log</h2>
                <div class="move-log" id="moveLog"></div>
            </div>
        </div>
    </div>

    <script>
        const GAME_ID = {{ game.id }};
        const ROWS = 7, COLS = 7;

        let moves = [];
        let gameData = null;
        let currentMove = -1;
        let playing = false;
        let playTimeout = null;
        let playbackMode = 'realtime';  // 'realtime' or 'fixed'
        let fixedSpeed = 5;
        let timeScale = 1;

        // ── Load game data ──────────────────────────────────────────
        async function loadGame() {
            try {
                const res = await fetch(`/api/games/${GAME_ID}`);
                if (!res.ok) throw new Error('Game not found');
                gameData = await res.json();
                moves = gameData.moves || [];
                initUI();
            } catch (e) {
                document.getElementById('loadingScreen').innerHTML =
                    `<div style="color: var(--error); font-size: 1.2rem;">Failed to load game data</div>`;
            }
        }

        function initUI() {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';

            // Result badge
            const badge = document.getElementById('resultBadge');
            if (gameData.winner === 'red') {
                badge.className = 'result-badge red-win';
                badge.textContent = `🏆 ${gameData.red_bot} wins!`;
            } else if (gameData.winner === 'blue') {
                badge.className = 'result-badge blue-win';
                badge.textContent = `🏆 ${gameData.blue_bot} wins!`;
            } else {
                badge.className = 'result-badge draw';
                badge.textContent = '🤝 Draw';
            }
            document.getElementById('reasonText').textContent = gameData.reason || '';
            document.getElementById('totalMoves').textContent = moves.length;

            initBoard();
            buildMoveLog();
            renderBoard(-1);
            updateUI();
        }

        // ── Board rendering ─────────────────────────────────────────
        function initBoard() {
            const grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.id = `cell-${r}-${c}`;
                    grid.appendChild(cell);
                }
            }
        }

        function renderBoard(moveIdx) {
            let lastRow = -1, lastCol = -1;

            if (moveIdx >= 0 && moveIdx < moves.length) {
                const m = moves[moveIdx];
                const board = m.board_after;
                if (m.move) {
                    lastRow = m.move[0];
                    lastCol = m.move[1];
                }

                if (board) {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            const cell = document.getElementById(`cell-${r}-${c}`);
                            const [count, owner] = board[r][c];
                            cell.className = 'cell';
                            if (owner === 1) {
                                cell.classList.add('red');
                                cell.textContent = count || '';
                            } else if (owner === 2) {
                                cell.classList.add('blue');
                                cell.textContent = count || '';
                            } else {
                                cell.textContent = '';
                            }
                            if (r === lastRow && c === lastCol) {
                                cell.classList.add('highlight');
                                // Trigger animation
                                cell.classList.remove('explode');
                                void cell.offsetWidth;
                                cell.classList.add('explode');
                            }
                        }
                    }
                }
            } else {
                // Empty board
                for (let r = 0; r < ROWS; r++) {
                    for (let c = 0; c < COLS; c++) {
                        const cell = document.getElementById(`cell-${r}-${c}`);
                        cell.className = 'cell';
                        cell.textContent = '';
                    }
                }
            }

            // Update timers
            updateTimers(moveIdx);
        }

        function updateTimers(moveIdx) {
            let redTime = 60.0, blueTime = 60.0;
            let currentPlayer = null;

            if (moveIdx >= 0 && moveIdx < moves.length) {
                const m = moves[moveIdx];
                // Calculate remaining times by walking through moves up to this point
                redTime = 60.0;
                blueTime = 60.0;
                for (let i = 0; i <= moveIdx; i++) {
                    if (moves[i].player === 'red') {
                        redTime -= moves[i].time_taken;
                    } else {
                        blueTime -= moves[i].time_taken;
                    }
                }
                // Next player's turn
                currentPlayer = m.player === 'red' ? 'blue' : 'red';
            } else {
                currentPlayer = 'red'; // Red goes first
            }

            document.getElementById('redTimer').textContent = Math.max(0, redTime).toFixed(3) + 's';
            document.getElementById('blueTimer').textContent = Math.max(0, blueTime).toFixed(3) + 's';

            document.getElementById('redTimerBox').classList.toggle('active-turn', currentPlayer === 'red');
            document.getElementById('blueTimerBox').classList.toggle('active-turn', currentPlayer === 'blue');
        }

        // ── Move time indicator ─────────────────────────────────────
        function updateMoveTimeIndicator(moveIdx) {
            const el = document.getElementById('moveTimeIndicator');
            if (moveIdx >= 0 && moveIdx < moves.length) {
                const m = moves[moveIdx];
                const playerColor = m.player === 'red' ? 'var(--red-color)' : 'var(--blue-color)';
                el.innerHTML = `<span style="color:${playerColor}">${m.player === 'red' ? gameData.red_bot : gameData.blue_bot}</span> took <span class="time-val">${m.time_taken.toFixed(4)}s</span> for this move`;
            } else {
                el.innerHTML = '';
            }
        }

        // ── Move log ────────────────────────────────────────────────
        function buildMoveLog() {
            const log = document.getElementById('moveLog');
            if (moves.length === 0) {
                log.innerHTML = '<div style="text-align:center; color:var(--text-secondary); padding:1rem;">No moves recorded</div>';
                return;
            }

            log.innerHTML = moves.map((m, i) => {
                let resultClass = 'ok';
                let resultLabel = '';
                if (m.result === 'win' || m.result === 'infinite_chain_win') {
                    resultClass = 'win';
                    resultLabel = '🏆 WIN';
                } else if (m.result === 'invalid_move') {
                    resultClass = 'invalid';
                    resultLabel = '❌ INVALID';
                } else if (m.result === 'timeout') {
                    resultClass = 'timeout';
                    resultLabel = '⏰ TIMEOUT';
                } else if (m.result && m.result.startsWith('forfeit')) {
                    resultClass = 'invalid';
                    resultLabel = '🏳 FORFEIT';
                }

                const moveStr = m.move ? `(${m.move[0]}, ${m.move[1]})` : '—';
                const teamName = m.player === 'red' ? gameData.red_bot : gameData.blue_bot;

                return `
                    <div class="move-log-entry" id="log-${i}" onclick="goToMove(${i})">
                        <div class="move-num">#${i + 1}</div>
                        <div class="move-team ${m.player}">${teamName}</div>
                        <div class="move-cell">${moveStr}</div>
                        ${resultLabel ? `<span class="move-result ${resultClass}">${resultLabel}</span>` : ''}
                        <div class="move-time">${m.time_taken.toFixed(4)}s</div>
                    </div>
                `;
            }).join('');
        }

        // ── UI update ───────────────────────────────────────────────
        function updateUI() {
            document.getElementById('moveNum').textContent = currentMove + 1;

            // Progress bar
            const pct = moves.length > 0 ? ((currentMove + 1) / moves.length) * 100 : 0;
            document.getElementById('progressBar').style.width = pct + '%';

            // Highlight active log entry
            document.querySelectorAll('.move-log-entry').forEach((el, i) => {
                el.classList.toggle('active', i === currentMove);
            });

            // Scroll active entry into view
            if (currentMove >= 0) {
                const el = document.getElementById(`log-${currentMove}`);
                const container = document.getElementById('moveLog');
                if (el && container) {
                    const elTop = el.offsetTop - container.offsetTop;
                    const elBottom = elTop + el.offsetHeight;
                    const scrollTop = container.scrollTop;
                    const containerHeight = container.clientHeight;
                    if (elTop < scrollTop) {
                        container.scrollTop = elTop;
                    } else if (elBottom > scrollTop + containerHeight) {
                        container.scrollTop = elBottom - containerHeight;
                    }
                }
            }

            updateMoveTimeIndicator(currentMove);

            // Button states
            document.getElementById('btnPrev').disabled = currentMove < 0;
            document.getElementById('btnStart').disabled = currentMove < 0;
            document.getElementById('btnNext').disabled = currentMove >= moves.length - 1;
            document.getElementById('btnEnd').disabled = currentMove >= moves.length - 1;
        }

        // ── Navigation ──────────────────────────────────────────────
        function goToMove(n) {
            stopPlay();
            currentMove = Math.max(-1, Math.min(n, moves.length - 1));
            renderBoard(currentMove);
            updateUI();
        }

        function nextMove() {
            if (currentMove < moves.length - 1) {
                currentMove++;
                renderBoard(currentMove);
                updateUI();
            } else {
                stopPlay();
            }
        }

        function prevMove() {
            if (currentMove >= 0) {
                currentMove--;
                renderBoard(currentMove);
                updateUI();
            }
        }

        function seekProgress(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            const pct = (event.clientX - rect.left) / rect.width;
            const targetMove = Math.round(pct * moves.length) - 1;
            goToMove(targetMove);
        }

        // ── Playback ────────────────────────────────────────────────
        function togglePlay() {
            if (playing) {
                stopPlay();
            } else {
                startPlay();
            }
        }

        function startPlay() {
            playing = true;
            document.getElementById('btnPlay').textContent = '⏸ Pause';
            if (currentMove >= moves.length - 1) currentMove = -1;
            scheduleNextMove();
        }

        function stopPlay() {
            playing = false;
            document.getElementById('btnPlay').textContent = '▶ Play';
            if (playTimeout) {
                clearTimeout(playTimeout);
                playTimeout = null;
            }
        }

        function scheduleNextMove() {
            if (!playing) return;
            if (currentMove >= moves.length - 1) {
                stopPlay();
                return;
            }

            let delay;
            const nextIdx = currentMove + 1;

            if (playbackMode === 'realtime') {
                // Use the actual time_taken for the next move, divided by timeScale
                const timeTaken = moves[nextIdx].time_taken;
                // Clamp minimum delay to 50ms so the UI doesn't freeze on very fast moves
                delay = Math.max(50, (timeTaken * 1000) / timeScale);
            } else {
                // Fixed speed: moves per second
                delay = 1000 / fixedSpeed;
            }

            playTimeout = setTimeout(() => {
                nextMove();
                if (playing) scheduleNextMove();
            }, delay);
        }

        // ── Mode switching ──────────────────────────────────────────
        function setMode(mode) {
            playbackMode = mode;
            document.getElementById('modeRealtime').classList.toggle('active', mode === 'realtime');
            document.getElementById('modeFixed').classList.toggle('active', mode === 'fixed');
            document.getElementById('speedControl').classList.toggle('hidden', mode !== 'fixed');
            document.getElementById('timescaleControl').classList.toggle('hidden', mode !== 'realtime');

            // If currently playing, restart with new mode
            if (playing) {
                if (playTimeout) clearTimeout(playTimeout);
                scheduleNextMove();
            }
        }

        // ── Speed slider (fixed mode) ───────────────────────────────
        document.getElementById('speedSlider').addEventListener('input', (e) => {
            fixedSpeed = parseInt(e.target.value);
            document.getElementById('speedLabel').textContent = fixedSpeed + '×';
            if (playing && playbackMode === 'fixed') {
                clearTimeout(playTimeout);
                scheduleNextMove();
            }
        });

        // ── Time scale slider (real-time mode) ──────────────────────
        document.getElementById('timescaleSlider').addEventListener('input', (e) => {
            timeScale = parseInt(e.target.value);
            let label;
            if (timeScale === 1) {
                label = '1× (actual speed)';
            } else {
                label = timeScale + '× faster';
            }
            document.getElementById('timescaleLabel').textContent = label;
            if (playing && playbackMode === 'realtime') {
                clearTimeout(playTimeout);
                scheduleNextMove();
            }
        });

        // ── Initialize ──────────────────────────────────────────────
        loadGame();
    </script>
</body>

</html>
