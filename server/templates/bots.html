<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Royale — Bot Source Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a2e;
            --bg-card-hover: #1e1e35;
            --accent: #e94560;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --gold: #ffd700;
            --silver: #c0c0c0;
            --bronze: #cd7f32;
            --text-primary: #eaeaea;
            --text-secondary: #8888a0;
            --border: #2a2a40;
            --success: #00c853;
            --error: #ff5252;
            --radius: 12px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(15, 52, 96, 0.15) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .nav {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .nav-brand {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--accent);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 2rem;
            padding-top: 1.5rem;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e94560, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        /* Search bar */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .search-box {
            flex: 1;
            min-width: 200px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box input:focus {
            border-color: var(--accent);
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
        }

        .stat-pill {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 0.4rem 1rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .stat-pill strong {
            color: var(--text-primary);
        }

        /* Bot cards grid */
        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
        }

        .bot-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bot-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--accent);
        }

        .bot-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .bot-rank {
            font-weight: 800;
            font-size: 1.1rem;
            min-width: 32px;
        }

        .bot-rank.rank-1 { color: var(--gold); }
        .bot-rank.rank-2 { color: var(--silver); }
        .bot-rank.rank-3 { color: var(--bronze); }

        .bot-name {
            font-weight: 700;
            font-size: 1.05rem;
            flex: 1;
            margin-left: 0.75rem;
        }

        .bot-stats {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
        }

        .bot-stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .bot-stat .label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .bot-stat .value { font-weight: 700; }
        .bot-stat .value.win { color: var(--success); }
        .bot-stat .value.loss { color: var(--error); }

        .bot-card-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: auto;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            text-align: center;
            border: 1px solid var(--border);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--accent), #c23152);
            color: white;
            border: none;
            flex: 1;
        }

        .btn-download:hover {
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-preview {
            background: var(--bg-secondary);
            color: var(--text-primary);
            flex: 1;
        }

        .btn-preview:hover {
            border-color: var(--accent);
            background: rgba(233, 69, 96, 0.1);
        }

        .bot-file-size {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        /* Code preview modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .modal-overlay.visible {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            width: 100%;
            max-width: 800px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .modal-title {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem;
            line-height: 1;
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--accent);
        }

        .modal-body {
            overflow-y: auto;
            padding: 0;
            flex: 1;
        }

        .modal-body pre {
            margin: 0;
            padding: 1.5rem;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre;
            overflow-x: auto;
            tab-size: 4;
        }

        .modal-footer {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
            font-size: 1rem;
            grid-column: 1 / -1;
        }

        .no-results .emoji {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        @media (max-width: 700px) {
            .header h1 { font-size: 1.8rem; }
            .container { padding: 1rem; }
            .bots-grid { grid-template-columns: 1fr; }
            .modal { max-height: 90vh; }
            .modal-overlay { padding: 1rem; }
        }
    </style>
</head>

<body>
    <nav class="nav">
        <a class="nav-brand" href="/">⚔ Bot Royale</a>
        <ul class="nav-links">
            <li><a href="/">Leaderboard</a></li>
            <li><a href="/replays">Game Replays</a></li>
            <li><a href="/bots" class="active">Bot Code</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="header">
            <h1>🤖 Bot Source Code</h1>
            <p>Browse and download the source code for every team's bot</p>
        </div>

        <div class="filter-bar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by team name..." autocomplete="off">
            </div>
            <div class="stat-pill" id="countPill"></div>
        </div>

        <div class="bots-grid" id="botsGrid"></div>
    </div>

    <!-- Code preview modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">Bot Source</div>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <pre id="modalCode">Loading...</pre>
            </div>
            <div class="modal-footer">
                <a class="btn btn-download" id="modalDownloadBtn" href="#">⬇ Download</a>
            </div>
        </div>
    </div>

    <script>
        const allBots = {{ bots | tojson }};

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            return (bytes / 1024).toFixed(1) + ' KB';
        }

        function renderBots(filter) {
            const grid = document.getElementById('botsGrid');
            const pill = document.getElementById('countPill');
            const q = (filter || '').toLowerCase();

            const filtered = q
                ? allBots.filter(b => b.name.toLowerCase().includes(q))
                : allBots;

            pill.innerHTML = `Showing <strong>${filtered.length}</strong> bot${filtered.length !== 1 ? 's' : ''}`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results"><span class="emoji">🔍</span>No bots found${q ? ' matching "' + q + '"' : ''}</div>`;
                return;
            }

            grid.innerHTML = filtered.map(b => `
                <div class="bot-card">
                    <div class="bot-card-header">
                        <span class="bot-rank rank-${b.rank}">#${b.rank}</span>
                        <span class="bot-name">${b.name}</span>
                        <span class="bot-file-size">${formatSize(b.size)}</span>
                    </div>
                    <div class="bot-stats">
                        <div class="bot-stat"><span class="label">Wins</span><span class="value win">${b.wins}</span></div>
                        <div class="bot-stat"><span class="label">Losses</span><span class="value loss">${b.losses}</span></div>
                        <div class="bot-stat"><span class="label">Win Rate</span><span class="value">${Math.round(b.wins / (b.wins + b.losses) * 100)}%</span></div>
                    </div>
                    <div class="bot-card-actions">
                        <button class="btn btn-preview" onclick="previewBot('${b.name}', '${b.filename}')">👁 Preview</button>
                        <a class="btn btn-download" href="/bots/${b.name}/download">⬇ Download</a>
                    </div>
                </div>
            `).join('');
        }

        // Search
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderBots(e.target.value.trim());
        });

        // Preview modal
        async function previewBot(name, filename) {
            const overlay = document.getElementById('modalOverlay');
            const code = document.getElementById('modalCode');
            const title = document.getElementById('modalTitle');
            const dlBtn = document.getElementById('modalDownloadBtn');

            title.textContent = filename;
            dlBtn.href = `/bots/${name}/download`;
            code.textContent = 'Loading...';
            overlay.classList.add('visible');

            try {
                const res = await fetch(`/api/bots/${name}/source`);
                if (!res.ok) throw new Error('Failed to load');
                code.textContent = await res.text();
            } catch (e) {
                code.textContent = '// Error loading source code';
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('visible');
        }

        function closeModalOutside(e) {
            if (e.target === e.currentTarget) closeModal();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        // Init
        renderBots('');
    </script>
</body>

</html>
